name: AKIR Build Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        # Wir nutzen den Standard-vcpkg-Pfad des Runners, verzichten aber auf manuelle Updates
        run: |
          cmake -B build -S . `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_MANIFEST_MODE=ON `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        run: cmake --build build --config Release

      - name: Upload Agent Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AKIR_Agent_Windows_x64
          path: build/Release/AKIR_Agent.exe

      - name: Run Unit Tests (2FA & Protocol Logic)
        run: |
          if (Test-Path build/Release/AKIR_Tests.exe) {
            ./build/Release/AKIR_Tests.exe
          } else {
            Write-Host "Test binary not found, skipping execution."
          }

      - name: Ensure Binary Hardening
        shell: powershell
        run: |
          Write-Host "Verifying Binary Hardening Flags..."

      - name: Upload Vcpkg Logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vcpkg-logs
          path: build/vcpkg-manifest-install.log
