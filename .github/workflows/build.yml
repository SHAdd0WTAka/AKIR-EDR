name: AKIR Build Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  security-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Bootstrap Vcpkg
        run: |
          cd vcpkg
          .\bootstrap-vcpkg.bat

      - name: Configure CMake
        run: |
          cmake -B build -S . `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_MANIFEST_MODE=ON `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        run: cmake --build build --config Release

      - name: Upload Agent Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AKIR_Agent_Windows_x64
          path: build/Release/AKIR_Agent.exe

      - name: Run Unit Tests (2FA & Protocol Logic)
        run: |
          if (Test-Path build/Release/AKIR_Tests.exe) {
            ./build/Release/AKIR_Tests.exe
          } else {
            Write-Host "Test binary not found, skipping execution."
          }

      - name: Check Binary Hardening (ASLR / DEP / SafeSEH)
        shell: powershell
        run: |
           = "build/Release/AKIR_Agent.exe"
          if (Test-Path ) {
            # Check ASLR (DLL characteristics 0x40 = DYNAMIC_BASE)
             = Get-Item 
            Add-Type -AssemblyName System.Reflection
             = [System.IO.BinaryReader]::new([System.IO.File]::OpenRead(.FullName))
            .BaseStream.Seek(0x3C, 0) | Out-Null
             = .ReadUInt32()
            .BaseStream.Seek( + 24, 0) | Out-Null
             = .ReadUInt16()
            .BaseStream.Seek( + 92 + 2, 0) | Out-Null
            [int] = .ReadUInt16()
            .Close()
             = ( -band 0x40) -eq 0x40
            Write-Host "ASLR (DYNAMIC_BASE): "
            Write-Host "DLL Characteristics: 0x"
            if (-not ) { throw "ASLR not enabled in binary!" }
            Write-Host "Binary hardening: OK" -ForegroundColor Green
          } else {
            Write-Host "Agent binary not found at , skipping hardening check."
          }

      - name: Upload Vcpkg Logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vcpkg-logs
          path: build/vcpkg-manifest-install.log