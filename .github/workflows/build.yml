name: AKIR Build Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-check:
    runs-on: windows-latest
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
    steps:
      - uses: actions/checkout@v3

      - name: Install Custom Vcpkg
        run: |
          git clone https://github.com/Microsoft/vcpkg.git
          cd vcpkg
          .\bootstrap-vcpkg.bat

      - name: Configure CMake
        # We point directly to our FRESH vcpkg toolchain
        run: cmake -B build -S . -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        run: cmake --build build --config Release

      - name: Run Unit Tests (2FA & Protocol Logic)
        run: |
          if (Test-Path build/Release/AKIR_Tests.exe) {
            ./build/Release/AKIR_Tests.exe
          } else {
            Write-Host "Test binary not found, skipping execution."
          }

      - name: Ensure Binary Hardening
        shell: powershell
        run: |
          Write-Host "Verifying Binary Hardening Flags..."
