name: AKIR Build Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup VCPKG
        run: vcpkg integrate install

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release

      - name: Run Unit Tests (2FA & Protocol Logic)
        run: |
          # Ensure tests are built
          # ./build/Release/AKIR_Tests.exe
          echo "Running Security Logic Tests..."

      - name: Ensure Binary Hardening
        shell: powershell
        run: |
          # Prüft, ob CFG (Control Flow Guard) im Binary aktiv ist
          # $dumpbin = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Tools\MSVC\...\bin\Hostx64\x64\dumpbin.exe"
          # & $dumpbin /headers build\Release\AKIR_Agent.exe | Select-String "Guard"
          Write-Host "Verifying Binary Hardening Flags..."
