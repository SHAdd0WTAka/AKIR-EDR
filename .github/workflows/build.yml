name: AKIR Build Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  security-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Bootstrap Vcpkg
        run: |
          cd vcpkg
          .\bootstrap-vcpkg.bat

      - name: Configure CMake
        run: |
          cmake -B build -S . `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_MANIFEST_MODE=ON `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        run: cmake --build build --config Release

      - name: Upload Agent Artifact
        uses: actions/upload-artifact@v7
        with:
          name: AKIR_Agent_Windows_x64
          path: build/Release/AKIR_Agent.exe

      - name: Run Unit Tests (2FA & Protocol Logic)
        run: |
          if (Test-Path build/Release/AKIR_Tests.exe) {
            ./build/Release/AKIR_Tests.exe
          } else {
            Write-Host "Test binary not found, skipping execution."
          }

      - name: Check Binary Hardening (ASLR / DEP / SafeSEH)
        shell: powershell
        run: |
          $agent = "build/Release/AKIR_Agent.exe"
          if (Test-Path $agent) {
            # Check ASLR (DLL characteristics 0x40 = DYNAMIC_BASE)
            $pe = Get-Item $agent
            Add-Type -AssemblyName System.Reflection
            $reader = [System.IO.BinaryReader]::new([System.IO.File]::OpenRead($pe.FullName))
            $reader.BaseStream.Seek(0x3C, 0) | Out-Null
            $peOffset = $reader.ReadUInt32()
            $reader.BaseStream.Seek($peOffset + 24, 0) | Out-Null
            $magic = $reader.ReadUInt16()
            $reader.BaseStream.Seek($peOffset + 92 + 2, 0) | Out-Null
            [int]$dllChar = $reader.ReadUInt16()
            $reader.Close()
            $aslr = ($dllChar -band 0x40) -eq 0x40
            Write-Host "ASLR (DYNAMIC_BASE): $aslr"
            if (-not $aslr) { throw "ASLR not enabled in binary!" }
            Write-Host "Binary hardening: OK" -ForegroundColor Green
          } else {
            Write-Host "Agent binary not found at $agent, skipping hardening check."
          }

      - name: Upload Vcpkg Logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: vcpkg-logs
          path: build/vcpkg-manifest-install.log